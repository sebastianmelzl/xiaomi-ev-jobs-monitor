sources:
  # Xiaomi Technology company page, all European jobs
  # linkedin.com/company/xiaomi-technology → company ID 2300557
  - name: xiaomi_company_europe
    enabled: true
    type: company
    company_id: "2300557"
    geo_id: "91000002"   # Europe
    company: Xiaomi
    url: "https://www.linkedin.com/company/xiaomi-technology/jobs/"
    max_results: 250

  # Keyword searches — catches jobs LinkedIn may not surface in company results
  - name: xiaomi_ev_keyword
    enabled: true
    type: keyword
    keywords: "Xiaomi EV"
    geo_id: "91000002"
    company: Xiaomi
    url: "https://www.linkedin.com/jobs/search/?keywords=xiaomi+EV"
    max_results: 75

  - name: xiaomi_automotive_keyword
    enabled: true
    type: keyword
    keywords: "Xiaomi Automotive"
    geo_id: "91000002"
    company: Xiaomi
    url: "https://www.linkedin.com/jobs/search/?keywords=xiaomi+automotive"
    max_results: 75

  - name: xiaomi_su7_keyword
    enabled: true
    type: keyword
    keywords: "Xiaomi SU7"
    geo_id: "91000002"
    company: Xiaomi
    url: "https://www.linkedin.com/jobs/search/?keywords=xiaomi+su7"
    max_results: 75
