<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xiaomi EV Jobs Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,300..800;1,14..32,300..800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/css/app.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div class="logo">
          <div class="logo-mark">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2L5 8H8L6.5 14L11 7.5H8L9.5 2H8Z" fill="currentColor" stroke="currentColor" stroke-width=".4" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="logo-wordmark">
            <span class="logo-title">EV Monitor</span>
            <span class="logo-sub">Xiaomi · China</span>
          </div>
        </div>
        <button class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3h12M1 7h12M1 11h12" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>

      <nav class="nav">
        <a href="#/" class="nav-item" data-route="overview">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="2" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="2" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/><rect x="11" y="11" width="7" height="7" rx="1.5" stroke="currentColor" stroke-width="1.5"/></svg>
          <span>Overview</span>
        </a>
        <a href="#/jobs" class="nav-item" data-route="jobs">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><rect x="2" y="3" width="16" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M6 7h8M6 10h8M6 13h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>EV Jobs</span>
          <span class="nav-badge" id="navBadgeJobs"></span>
        </a>
        <a href="#/archive" class="nav-item" data-route="archive">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 5v12a1 1 0 001 1h12a1 1 0 001-1V5M3 5l2-2h10l2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M8 10h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Archive</span>
        </a>
        <a href="#/runs" class="nav-item" data-route="runs">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="7" stroke="currentColor" stroke-width="1.5"/><path d="M10 6v4l3 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Scrape Runs</span>
        </a>
        <a href="#/settings" class="nav-item" data-route="settings">
          <svg class="nav-icon" viewBox="0 0 20 20" fill="none"><circle cx="10" cy="10" r="2.5" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.22 4.22l1.42 1.42M14.36 14.36l1.42 1.42M4.22 15.78l1.42-1.42M14.36 5.64l1.42-1.42" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          <span>Settings</span>
        </a>
      </nav>

      <div class="sidebar-footer">
        <button class="theme-toggle" id="themeToggle" title="Toggle dark/light mode">
          <span class="theme-icon-dark">☀️</span>
          <span class="theme-icon-light">🌙</span>
        </button>
        <div class="scrape-status-dot" id="scrapeStatusDot" title="Scrape status"></div>
      </div>
    </aside>

    <main class="main" id="main">
      <header class="topbar">
        <div class="topbar-left">
          <h1 class="page-title" id="pageTitle">Overview</h1>
          <span class="page-subtitle" id="pageSubtitle"></span>
        </div>
        <div class="topbar-right">
          <button class="cmd-trigger" onclick="cmdOpen()" title="Command palette (⌘K)">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none"><circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/><path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span>Search</span>
            <kbd>⌘K</kbd>
          </button>
          <button class="btn btn-primary" id="scrapeBtn" onclick="triggerScrape()">
            <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 112.5 8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><path d="M2.5 4.5V8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
            <span>Run Scrape</span>
          </button>
        </div>
      </header>

      <div class="content" id="content">
        <div class="loading-screen">
          <div class="spinner"></div>
          <p>Loading…</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <!-- Live scrape panel (fixed bottom, visible on all pages while a run is active) -->
  <div id="scrapeLivePanel" class="slp" style="display:none">
    <div class="slp-bar" onclick="slpToggle()">
      <span class="slp-spinner" id="slpSpinner">⟳</span>
      <span id="slpStatusText" class="slp-status-text">Initializing…</span>
      <span class="slp-spacer"></span>
      <span id="slpRunLabel" class="slp-run-label"></span>
      <a href="#/runs" class="slp-link" onclick="event.stopPropagation()">Full log →</a>
      <span class="slp-chevron" id="slpChevron">▲</span>
    </div>
    <div id="slpLog" class="slp-log" style="display:none"></div>
  </div>

  <!-- Command palette -->
  <div id="cmdOverlay" class="cmd-overlay">
    <div class="cmd-box">
      <div class="cmd-search-row">
        <svg class="cmd-search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
          <path d="M11 11l3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <input id="cmdInput" class="cmd-input" type="text" placeholder="Search jobs or type a command…" autocomplete="off" spellcheck="false" />
        <button class="cmd-esc-btn" onclick="cmdClose()">Esc</button>
      </div>
      <div id="cmdResults" class="cmd-results"></div>
      <div class="cmd-footer">
        <span><kbd>↑↓</kbd> navigate</span>
        <span><kbd>↵</kbd> open</span>
        <span><kbd>Esc</kbd> close</span>
      </div>
    </div>
  </div>

  <!-- Job detail modal -->
  <div id="jobModal" class="modal-overlay" style="display:none" onclick="closeJobModal(event)">
    <div class="modal-panel" id="jobModalPanel"></div>
  </div>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
  <script src="/static/js/api.js"></script>
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/overview.js"></script>
  <script src="/static/js/jobs.js"></script>
  <script src="/static/js/job-detail.js"></script>
  <script src="/static/js/archive.js"></script>
  <script src="/static/js/runs.js"></script>
  <script src="/static/js/settings.js"></script>
  <script src="/static/js/cmd-palette.js"></script>
  <script src="/static/js/app.js"></script>
</body>
</html>
